<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tarjetas Trivial Pursuit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f0f0; text-align: center; padding: 20px; }
h2 { font-size: 20px; margin-bottom: 16px; }
h3 { font-size: 14px; color: #555; margin: 12px 0 6px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 520px; margin: 0 auto; }
input { width: 100%; padding: 6px 10px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px; }
.btns { margin: 14px 0; }
button { padding: 9px 20px; font-size: 13px; cursor: pointer; border: 1px solid #aaa; border-radius: 6px; background: #fff; margin: 0 6px; }
button:hover { background: #eee; }
.trivial-card { width: 480px; background: #1a2744; border-radius: 0; padding: 10px; margin: 16px auto; display: flex; height: 220px; }
.trivial-inner { background: #fff; border-radius: 0; padding: 10px 14px 24px 10px; flex: 1; overflow: hidden; display: flex; flex-direction: column; gap:10px; position: relative;}
.dorso-lateral { width: 80px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 0; }
.dorso-lateral img { width: 120px; height: 90px; object-fit: contain; transform: rotate(-90deg); }
.card-row { display: flex; align-items: center; gap: 9px; min-height: 22px;}
.tri-svg { flex-shrink: 0; overflow: visible; }
.card-text { font-size: 11px; color: #111; line-height: 1.10; flex: 1; text-align: left; font-family: 'EB Garamond', Georgia, serif; }
.card-text strong { font-weight: 700; }
.card-num { font-size: 11px; color: #000000; text-align: right; position: absolute; bottom: 6px; right: 12px; }
.card-copyright {
  font-size: 8px;
  color: #000000;
  position: absolute;
  right: -25px;
  top: 50%;
  transform: translateY(-100%) rotate(-90deg);
  white-space: nowrap;
  font-family: Arial, sans-serif;
}
</style>
</head>
<body>
<h2>Creador de Tarjetas Trivial Pursuit</h2>
<h3>Preguntas</h3>
<div class="grid">
  <input id="q1" placeholder="Pregunta 1 (azul)">
  <input id="q2" placeholder="Pregunta 2 (rosa)">
  <input id="q3" placeholder="Pregunta 3 (amarillo)">
  <input id="q4" placeholder="Pregunta 4 (morado)">
  <input id="q5" placeholder="Pregunta 5 (verde)">
  <input id="q6" placeholder="Pregunta 6 (naranja)">
</div>
<h3>Respuestas</h3>
<div class="grid">
  <input id="a1" placeholder="Respuesta 1 (azul)">
  <input id="a2" placeholder="Respuesta 2 (rosa)">
  <input id="a3" placeholder="Respuesta 3 (amarillo)">
  <input id="a4" placeholder="Respuesta 4 (morado)">
  <input id="a5" placeholder="Respuesta 5 (verde)">
  <input id="a6" placeholder="Respuesta 6 (naranja)">
</div>
<div class="btns">
  <button onclick="generar()">Generar tarjetas</button>
  <button onclick="enviarDrive()">Enviar a Drive</button>
</div>

    <div class="card-row"><svg class="tri-svg" width="22" height="18" viewBox="-4 0 22 18"><path d="M0,0 Q-6,9 0,18 L18,9 Z" fill="#d63a6a"/></svg><span class="card-text" id="pq2"></span></div>
    <div class="card-row"><svg class="tri-svg" width="22" height="18" viewBox="-4 0 22 18"><path d="M0,0 Q-6,9 0,18 L18,9 Z" fill="#e8b800"/></svg><span class="card-text" id="pq3"></span></div>
    <div class="card-row"><svg class="tri-svg" width="22" height="18" viewBox="-4 0 22 18"><path d="M0,0 Q-6,9 0,18 L18,9 Z" fill="#6b3dbf"/></svg><span class="card-text" id="pq4"></span></div>
    <div class="card-row"><svg class="tri-svg" width="22" height="18" viewBox="-4 0 22 18"><path d="M0,0 Q-6,9 0,18 L18,9 Z" fill="#4a9a2e"/></svg><span class="card-text" id="pq5"></span></div>
    <div class="card-row"><svg class="tri-svg" width="22" height="18" viewBox="-4 0 22 18"><path d="M0,0 Q-6,9 0,18 L18,9 Z" fill="#e07820"/></svg><span class="card-text" id="pq6"></span></div>

  </div>
</div>

<script>
window.onload = function(){
  obtenerNumero();
}
let numTarjeta = 0;
function generar() {
  for (let i = 1; i <= 6; i++) {
    document.getElementById('pq' + i).innerText = document.getElementById('q' + i).value;
    // Respuestas en negrita
    document.getElementById('pa' + i).innerHTML = '<strong>' + document.getElementById('a' + i).value + '</strong>';
  }
}
function obtenerNumero() {
  fetch(SCRIPT_URL)
    .then(r => r.json())
    .then(data => {
      numTarjeta = data.num;
      document.getElementById('card-num').innerText = numTarjeta;
    });
}
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0j2AhejnkoCKXU155PPbeg6byWpjl_awBsy7rReNFoNCZjr5HWVg2WseAqe-r05mJJA/exec';
function enviarDrive() {
  generar();
  const alturaFrente = document.getElementById('frente').offsetHeight;
  document.getElementById('dorso').style.height = alturaFrente + 'px';

  document.fonts.ready.then(() => {
    ['frente', 'dorso'].forEach((id, idx) => {
      setTimeout(() => {
        html2canvas(document.getElementById(id), { scale: 3, useCORS: true }).then(canvas => {
          const base64 = canvas.toDataURL('image/png').split(',')[1];
          fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              image: base64,
              name: 'tarjeta_' + id + '_' + numTarjeta + '.png'
            })
          }).then(() => {
            if (id === 'dorso') {
              alert('¡Tarjetas enviadas!');
              numTarjeta++;
              document.getElementById('numFrente').innerText = numTarjeta;
              document.getElementById('numDorso').innerText = numTarjeta;
            }
          });
        });
      }, idx * 700);
    });
  });
}
</script>
